<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection Frame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --page-bg: #f7f9fc;
      --card-bg: #ffffff;
      --text-dark: #0d0a1f;
      --accent-blue: #3c71dd;
      --sale-red: #dc3b3b;
      --star-gold: #eebd29;
      --shadow-soft: 0 8px 16px 4px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", sans-serif;
      background: #edf2f7;
      color: var(--text-dark);
    }

    body {
      padding: 24px 16px 40px;
      display: flex;
      justify-content: center;
    }

    .demo-shell {
      width: min(100%, 1440px);
      background: var(--page-bg);
      padding-top: 32px;
    }

    .collection-banner {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 481px;
      position: relative;
      overflow: hidden;
      background-color: #beca74;
      background-image: url("./assets/collection-frame/garden-bg.png");
      background-size: cover;
      background-position: center center;
    }

    .cr-tag {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 3.5px;
      padding: 3.5px 7px;
      border-radius: 6px;
      background: #ffedd5;
      color: #c2410c;
      font-size: 12px;
      font-weight: 500;
      line-height: 16px;
      box-shadow: 0 0 8px #f97316;
    }

    .cr-tag svg {
      width: 10.5px;
      height: 10.5px;
      flex-shrink: 0;
    }

    .collection-row {
      min-height: 369px;
      display: grid;
      grid-template-columns: 512px 512px;
      gap: 32px;
      align-items: center;
      padding: 56px 32px;
    }

    .copy-column {
      width: 512px;
      min-height: 268px;
      display: flex;
      align-items: center;
    }

    .copy-stack {
      width: 340px;
      margin-left: 32px;
    }

    .copy-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .headline {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      line-height: 43.2px;
      color: #ffffff;
    }

    .description {
      margin: 0;
      font-size: 16px;
      font-weight: 400;
      line-height: 24.8px;
      color: #ffffff;
    }

    .view-all {
      margin-top: 16px;
      width: 107px;
      height: 48px;
      border: 0;
      background: var(--accent-blue);
      color: #fafaf0;
      font: inherit;
      font-size: 16px;
      font-weight: 400;
      line-height: 24.8px;
      cursor: pointer;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .view-all:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .view-all:active {
      transform: translateY(0);
    }

    .carousel-column {
      width: 512px;
      min-height: 369px;
      position: relative;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 256px);
      width: 512px;
      min-height: 369px;
    }

    .product-card {
      width: 256px;
      min-height: 369px;
      background: var(--card-bg);
      padding: 16px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
    }

    .product-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      height: 26px;
      padding: 2px 8px;
      background: var(--sale-red);
      color: #ffffff;
      font-size: 14px;
      font-weight: 400;
      line-height: 21.7px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .product-image {
      width: 224px;
      height: 224px;
      object-fit: contain;
      display: block;
    }

    .product-copy {
      width: 224px;
    }

    .product-title {
      margin: 0;
      min-height: 49.6px;
      font-size: 16px;
      font-weight: 400;
      line-height: 24.8px;
      color: var(--text-dark);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 24.8px;
      color: var(--text-dark);
    }

    .rating-row {
      width: 196px;
      height: 22px;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .stars {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .star {
      width: 16px;
      height: 16px;
      display: block;
    }

    .rating-text {
      font-size: 16px;
      font-weight: 400;
      line-height: 24.8px;
      color: var(--text-dark);
    }

    .carousel-arrow {
      position: absolute;
      top: 160px;
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: var(--shadow-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .carousel-arrow:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 18px 4px rgba(0, 0, 0, 0.08);
    }

    .carousel-arrow:active {
      transform: translateY(0);
    }

    .carousel-arrow.left {
      left: -24px;
    }

    .carousel-arrow.right {
      right: -24px;
    }

    .carousel-arrow svg {
      width: 24px;
      height: 24px;
    }

    @media (max-width: 1180px) {
      body {
        padding: 16px;
      }

      .demo-shell {
        padding-top: 16px;
      }

      .collection-banner {
        width: 100%;
      }

      .collection-row {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 32px 24px 40px;
      }

      .copy-column,
      .carousel-column,
      .product-grid {
        width: 100%;
      }

      .copy-stack {
        margin-left: 0;
      }

      .carousel-column {
        max-width: 512px;
        margin: 0 auto;
      }
    }

    @media (max-width: 640px) {
      .collection-banner {
        background-position: 44% center;
      }

      .collection-row {
        padding: 24px 16px 24px;
      }

      .copy-stack {
        width: 100%;
        max-width: 340px;
      }

      .headline {
        font-size: 28px;
        line-height: 38px;
      }

      .product-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .product-card {
        width: 100%;
        max-width: 320px;
        margin: 0 auto;
      }

      .carousel-arrow {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <section class="collection-banner" aria-label="Garden collection promotion">
      <span class="cr-tag" aria-label="CR tag">
        <svg viewBox="0 0 11 14" fill="none" aria-hidden="true">
          <path d="M6.5 1L1 8h4.5L4 13l6.5-7H6L6.5 1z" fill="#c2410c" stroke="#c2410c" stroke-width="0.5" stroke-linejoin="round" />
        </svg>
        CR
      </span>

      <div class="collection-row">
        <div class="copy-column">
          <div class="copy-stack">
            <div class="copy-text">
              <h1 class="headline">Over 40% Off Garden products</h1>
              <p class="description">Help you love your gardening more with great tools.</p>
            </div>
            <button class="view-all" type="button">View all</button>
          </div>
        </div>

        <div class="carousel-column">
          <div class="product-grid">
            <article class="product-card">
              <span class="product-badge">Sales</span>
              <img
                class="product-image"
                src="./assets/collection-frame/garden-product-1.png"
                alt="Flower Vegetables Planting Soil Loosening Shovel Home tools"
              />
              <div class="product-copy">
                <p class="product-title">Flower Vegetables Planting Soil Loosening Shovel Home..</p>
                <p class="product-price">$59.99</p>
                <div class="rating-row" aria-label="Rated 4.5 out of 5 from 200 reviews">
                  <div class="stars" aria-hidden="true">
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" fill="#EEBD29"/></svg>
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" fill="#EEBD29"/></svg>
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" fill="#EEBD29"/></svg>
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" fill="#EEBD29"/></svg>
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" stroke="#EEBD29" stroke-width="1.2" fill="none"/></svg>
                  </div>
                  <span class="rating-text">(4.5) 200 reviews</span>
                </div>
              </div>
            </article>

            <article class="product-card">
              <span class="product-badge">Sales</span>
              <img
                class="product-image"
                src="./assets/collection-frame/garden-product-2.png"
                alt="Creative Animal Resin Flowerpot Succulents Planter"
              />
              <div class="product-copy">
                <p class="product-title">Creative Animal Resin Flowerpot Succulents Planter</p>
                <p class="product-price">$59.99</p>
                <div class="rating-row" aria-label="Rated 4.5 out of 5 from 200 reviews">
                  <div class="stars" aria-hidden="true">
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" fill="#EEBD29"/></svg>
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" fill="#EEBD29"/></svg>
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" fill="#EEBD29"/></svg>
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" fill="#EEBD29"/></svg>
                    <svg class="star" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.87 3.79 4.18.61-3.02 2.94.71 4.16L8 10.75 4.26 12.7l.71-4.16L1.95 5.6l4.18-.61L8 1.2z" stroke="#EEBD29" stroke-width="1.2" fill="none"/></svg>
                  </div>
                  <span class="rating-text">(4.5) 200 reviews</span>
                </div>
              </div>
            </article>
          </div>

          <button class="carousel-arrow left" type="button" aria-label="Previous products">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15.4 6.7L10.1 12l5.3 5.3" stroke="#000000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>

          <button class="carousel-arrow right" type="button" aria-label="Next products">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M8.6 6.7L13.9 12l-5.3 5.3" stroke="#000000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
